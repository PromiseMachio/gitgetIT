<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1 class="heading">Statistics Hub</h1>
    <div class="firstDiv">
        <div>
            <h2>Ungrouped data</h2>
            <p class="firstDivPar">Add numbers to find mean and variance:</p>
            <input id="userInput">
        </div>

        <div class="calcRel">
            <button id="calculate">Calculate</button>

            <div class="results">
                <p class="resultPar">Output:</p>
                <p id="mean">`Mean:${mean}`</p>
                <p id="variance">`Variance:${variance}`</p>
            </div>
        </div>

    </div>


</body>
<script src="mean.js"></script>

</html>
